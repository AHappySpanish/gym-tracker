<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;padding:20px}
.container{max-width:480px;margin:0 auto}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:28px}
.form-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:20px;margin-bottom:20px}
label{font-size:12px;color:#888;display:block;margin-bottom:6px;margin-top:14px}
label:first-child{margin-top:0}
input,textarea{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;font-size:15px;color:#f0f0f0;outline:none;transition:border-color 0.2s}
input:focus,textarea:focus{border-color:#444}
textarea{resize:none;height:70px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;margin-top:18px;padding:14px;background:#fff;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.result{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:20px;margin-bottom:20px;display:none}
.result.visible{display:block}
.result-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.ex-name{font-size:17px;font-weight:600}
.pr-badge{background:#FFD60A;color:#000;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tag{font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px}
.tag-musculo{background:#1e3a5f;color:#60a5fa}
.tag-tipo{background:#1a2e1a;color:#4ade80}
.consejo{font-size:13px;color:#aaa;line-height:1.5;padding:12px;background:#111;border-radius:10px}
.consejo span{color:#f0f0f0;font-weight:500}
.historial-title{font-size:14px;font-weight:600;color:#888;margin-bottom:12px}
.entry{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:8px}
.entry-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.entry-name{font-size:14px;font-weight:600}
.entry-data{font-size:13px;color:#888}
.entry-tags{display:flex;gap:6px;margin-top:6px}
.entry-tag{font-size:11px;padding:2px 8px;border-radius:20px}
.loading{text-align:center;padding:20px;color:#888;font-size:14px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #333;border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:30px;color:#555;font-size:14px}
</style>
</head>
<body>
<div class="container">
  <h1>Gym Tracker</h1>
  <p class="sub">Registra tu entreno, la IA lo clasifica.</p>

  <div class="form-card">
    <label>Ejercicio</label>
    <input type="text" id="exercise" placeholder="ej. Press banca, Curl martillo..." autocomplete="off" />
    <div class="row">
      <div>
        <label>Peso (kg)</label>
        <input type="number" id="weight" placeholder="80" min="0" step="0.5" />
      </div>
      <div>
        <label>Repeticiones</label>
        <input type="number" id="reps" placeholder="8" min="1" />
      </div>
    </div>
    <label>Notas (opcional)</label>
    <textarea id="notes" placeholder="Sensaciones, técnica, lesiones..."></textarea>
    <button class="btn" id="submit-btn" onclick="submitEntry()">Registrar ejercicio</button>
  </div>

  <div class="result" id="result-card">
    <div class="result-header">
      <span class="ex-name" id="r-name"></span>
      <span class="pr-badge" id="r-pr" style="display:none">PR</span>
    </div>
    <div class="tags">
      <span class="tag tag-musculo" id="r-musculo"></span>
      <span class="tag tag-tipo" id="r-tipo"></span>
    </div>
    <div class="consejo"><span>Consejo: </span><span id="r-consejo"></span></div>
  </div>

  <div id="historial-section"></div>
</div>

<script>
const DB_KEY = 'gymtracker_entries';

function getEntries() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); } catch(e) { return []; }
}

function saveEntry(entry) {
  const entries = getEntries();
  entries.unshift(entry);
  localStorage.setItem(DB_KEY, JSON.stringify(entries.slice(0, 100)));
}

async function submitEntry() {
  const exercise = document.getElementById('exercise').value.trim();
  const weight = document.getElementById('weight').value;
  const reps = document.getElementById('reps').value;
  const notes = document.getElementById('notes').value.trim();

  if (!exercise || !weight || !reps) {
    alert('Rellena ejercicio, peso y repeticiones.');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Clasificando...';

  try {
    const res = await fetch('/api/classify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ exercise, weight: parseFloat(weight), reps: parseInt(reps), notes })
    });
    const data = await res.json();

    const entry = {
      id: Date.now(),
      fecha: new Date().toLocaleDateString('es-ES', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }),
      ejercicio_raw: exercise,
      nombre_limpio: data.nombre_limpio || exercise,
      peso: parseFloat(weight),
      reps: parseInt(reps),
      musculo: data.musculo_principal || '—',
      tipo: data.tipo || '—',
      es_pr: data.es_pr || false,
      consejo: data.consejo || '',
      notas: notes
    };

    saveEntry(entry);
    showResult(entry);
    renderHistorial();

    document.getElementById('exercise').value = '';
    document.getElementById('weight').value = '';
    document.getElementById('reps').value = '';
    document.getElementById('notes').value = '';

  } catch(e) {
    alert('Error al clasificar. Comprueba tu conexión.');
  }

  btn.disabled = false;
  btn.innerHTML = 'Registrar ejercicio';
}

function showResult(entry) {
  document.getElementById('r-name').textContent = entry.nombre_limpio + ' · ' + entry.peso + 'kg × ' + entry.reps;
  document.getElementById('r-musculo').textContent = entry.musculo;
  document.getElementById('r-tipo').textContent = entry.tipo;
  document.getElementById('r-consejo').textContent = entry.consejo;
  const pr = document.getElementById('r-pr');
  pr.style.display = entry.es_pr ? 'inline-block' : 'none';
  const card = document.getElementById('result-card');
  card.classList.add('visible');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderHistorial() {
  const entries = getEntries();
  const sec = document.getElementById('historial-section');
  if (entries.length === 0) {
    sec.innerHTML = '<div class="empty">Sin entradas aún. Registra tu primer ejercicio.</div>';
    return;
  }
  sec.innerHTML = '<div class="historial-title">Historial</div>' + entries.map(e => `
    <div class="entry">
      <div class="entry-top">
        <span class="entry-name">${e.nombre_limpio} ${e.es_pr ? '<span style="background:#FFD60A;color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;margin-left:6px">PR</span>' : ''}</span>
        <span class="entry-data">${e.fecha}</span>
      </div>
      <div class="entry-data">${e.peso}kg × ${e.reps} reps</div>
      <div class="entry-tags">
        <span class="entry-tag" style="background:#1e3a5f;color:#60a5fa">${e.musculo}</span>
        <span class="entry-tag" style="background:#1a2e1a;color:#4ade80">${e.tipo}</span>
      </div>
    </div>
  `).join('');
}

renderHistorial();
</script>
</body>
</html>
